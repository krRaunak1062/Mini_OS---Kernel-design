  <text x="90" y="204" font-size="9" fill="#d2a8ff">NFR-PERF-02</text>
  <text x="90" y="218" font-size="8" fill="#6e7681">PIT stability ~1000/10s</text>
  <text x="200" y="204" font-size="9" fill="#8b949e">PIT ticks ≈ 1000 over</text>
  <text x="200" y="218" font-size="8" fill="#6e7681">10 seconds ±5%</text>
  <text x="470" y="204" font-size="9" fill="#8b949e">count pit_get_ticks() delta</text>
