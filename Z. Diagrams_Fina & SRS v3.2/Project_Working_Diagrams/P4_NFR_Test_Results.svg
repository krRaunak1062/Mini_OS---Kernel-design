  <text x="90" y="124" font-size="9" fill="#d2a8ff">EXT-SW-01</text>
  <text x="90" y="138" font-size="8" fill="#6e7681">Mem/Sched interface</text>
  <text x="200" y="124" font-size="9" fill="#8b949e">sched calls paging_create/</text>
  <text x="200" y="138" font-size="8" fill="#6e7681">free_directory correctly</text>
  <text x="470" y="124" font-size="9" fill="#8b949e">Create PD, verify zeroed,</text>
  <text x="470" y="138" font-size="8" fill="#6e7681">free, check no corruption</text>
  <text x="680" y="130" font-size="9" fill="#3fb950">PASS (3/3 checks)</text>
  <text x="800" y="130" font-size="11" fill="#3fb950">✓</text>

