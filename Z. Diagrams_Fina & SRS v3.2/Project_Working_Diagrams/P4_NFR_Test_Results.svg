  <text x="200" y="258" font-size="8" fill="#6e7681">must raise Page Fault</text>
  <text x="470" y="244" font-size="9" fill="#8b949e">Walk all PTEs, check U/S=0</text>
  <text x="470" y="258" font-size="8" fill="#6e7681">on all kernel-mapped pages</text>
  <text x="680" y="244" font-size="9" fill="#3fb950">0 violations</text>
  <text x="680" y="258" font-size="8" fill="#6e7681">2048+ PTEs audited</text>
  <text x="800" y="250" font-size="11" fill="#3fb950">✓</text>

