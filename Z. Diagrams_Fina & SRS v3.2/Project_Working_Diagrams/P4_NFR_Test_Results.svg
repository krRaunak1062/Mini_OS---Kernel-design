  <text x="90" y="164" font-size="9" fill="#d2a8ff">NFR-PERF-01</text>
  <text x="90" y="178" font-size="8" fill="#6e7681">Context switch &lt;50μs</text>
  <text x="200" y="164" font-size="9" fill="#8b949e">context_switch() must</text>
  <text x="200" y="178" font-size="8" fill="#6e7681">complete in under 50μs</text>
  <text x="470" y="164" font-size="9" fill="#8b949e">RDTSC before/after, cycles</text>
  <text x="470" y="178" font-size="8" fill="#6e7681">÷ CPU freq → microseconds</text>
  <text x="680" y="164" font-size="9" fill="#3fb950">0.3 μs measured</text>
  <text x="680" y="178" font-size="8" fill="#6e7681">(166× under limit)</text>
  <text x="800" y="170" font-size="11" fill="#3fb950">✓</text>

