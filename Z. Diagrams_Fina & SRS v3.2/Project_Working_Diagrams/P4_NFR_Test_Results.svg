  <text x="200" y="338" font-size="8" fill="#6e7681">logs CR2 + error code</text>
  <text x="470" y="324" font-size="9" fill="#8b949e">Read IDT[14] gate addr,</text>
  <text x="470" y="338" font-size="8" fill="#6e7681">verify non-NULL handler</text>
  <text x="680" y="330" font-size="9" fill="#3fb950">ISR14 addr verified</text>
  <text x="800" y="330" font-size="11" fill="#3fb950">✓</text>

