  <text x="90" y="364" font-size="9" fill="#d2a8ff">NFR-MAINT-01 (a)</text>
  <text x="90" y="378" font-size="8" fill="#6e7681">Naming prefixes enforced</text>
  <text x="200" y="364" font-size="9" fill="#8b949e">mm_ sched_ paging_ isr_</text>
  <text x="200" y="378" font-size="8" fill="#6e7681">pit_ pic_ prefixes used</text>
  <text x="470" y="364" font-size="9" fill="#8b949e">Compile-time: function</text>
  <text x="470" y="378" font-size="8" fill="#6e7681">symbol audit via nm</text>
  <text x="680" y="370" font-size="9" fill="#3fb950">All 35 functions pass</text>
  <text x="800" y="370" font-size="11" fill="#3fb950">✓</text>

  <!-- NFR-MAINT-01 arch isolation -->
  <rect x="60" y="388" width="780" height="40" rx="2" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <text x="90" y="404" font-size="9" fill="#d2a8ff">NFR-MAINT-01 (b)</text>
  <text x="90" y="418" font-size="8" fill="#6e7681">arch/ isolation</text>
  <text x="200" y="404" font-size="9" fill="#8b949e">CR0/CR3/port I/O only</text>
  <text x="200" y="418" font-size="8" fill="#6e7681">in arch/x86/ directory</text>
  <text x="470" y="404" font-size="9" fill="#8b949e">Source audit: grep outb/inb</text>
  <text x="470" y="418" font-size="8" fill="#6e7681">outside arch/ → 0 hits</text>
  <text x="680" y="410" font-size="9" fill="#3fb950">0 violations</text>
  <text x="800" y="410" font-size="11" fill="#3fb950">✓</text>

