  <text x="467" y="155" text-anchor="middle" font-size="8.5" fill="#93c5fd">COM1 0x3F8</text>
  <text x="467" y="167" font-size="8" fill="#64748b">9600 baud</text>

  <!-- ===================== mm/ subsystem ===================== -->
  <rect x="30" y="215" width="480" height="230" rx="6" fill="#0c1f16" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="270" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#86efac">«subsystem» mm/ (Memory Management)</text>
  <text x="270" y="245" text-anchor="middle" font-size="9" fill="#4ade80">Owner: Aman Yadav (B24CS1006) | S1, S2</text>

  <!-- physical mm -->
  <rect x="50" y="255" width="200" height="100" rx="4" fill="#0a1a10" stroke="#16a34a" stroke-width="1.5"/>
  <text x="150" y="271" text-anchor="middle" font-size="10" font-weight="bold" fill="#bbf7d0">physical_memory_manager</text>
  <line x1="50" y1="277" x2="250" y2="277" stroke="#16a34a" stroke-width="0.5"/>
  <text x="60" y="291" font-size="9" fill="#86efac">bitmap : uint32_t[]</text>
  <text x="60" y="304" font-size="9" fill="#86efac">totalRAM : uint32_t</text>
  <line x1="50" y1="310" x2="250" y2="310" stroke="#16a34a" stroke-width="0.5"/>
  <text x="60" y="323" font-size="9" fill="#4ade80">mm_alloc_frame()</text>
  <text x="60" y="336" font-size="9" fill="#4ade80">mm_free_frame(addr)</text>
  <text x="60" y="348" font-size="8" fill="#6b7280">mm/mm_phys.c — REQ-MEM-03</text>

  <!-- Interface: IFrameAlloc -->
  <circle cx="250" cy="300" r="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="256" y="298" font-size="8" fill="#86efac">IFrameAlloc</text>

  <!-- virtual mm -->
  <rect x="270" y="255" width="220" height="115" rx="4" fill="#0a1a10" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="271" text-anchor="middle" font-size="10" font-weight="bold" fill="#bbf7d0">virtual_memory_manager</text>
  <line x1="270" y1="277" x2="490" y2="277" stroke="#16a34a" stroke-width="0.5"/>
  <text x="280" y="291" font-size="9" fill="#86efac">heap_virt : 0xC0400000</text>
  <text x="280" y="304" font-size="9" fill="#86efac">heap_phys : 0x00500000</text>
  <text x="280" y="317" font-size="9" fill="#86efac">page_dir_t*</text>
  <line x1="270" y1="323" x2="490" y2="323" stroke="#16a34a" stroke-width="0.5"/>
  <text x="280" y="336" font-size="9" fill="#4ade80">paging_init()</text>
  <text x="280" y="349" font-size="9" fill="#4ade80">paging_map_page(v,p,f)</text>
  <text x="280" y="362" font-size="9" fill="#4ade80">paging_create_directory()</text>
  <text x="280" y="367" font-size="8" fill="#6b7280">arch/x86/paging.c — REQ-MEM-02,04</text>

  <!-- Interface: IPageDir -->
  <circle cx="490" cy="330" r="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
  <text x="496" y="328" font-size="8" fill="#86efac">IPageDir</text>

  <!-- heap -->
  <rect x="50" y="375" width="200" height="55" rx="4" fill="#0a1a10" stroke="#16a34a" stroke-width="1.5"/>
  <text x="150" y="391" text-anchor="middle" font-size="10" font-weight="bold" fill="#bbf7d0">heap_manager</text>
  <line x1="50" y1="397" x2="250" y2="397" stroke="#16a34a" stroke-width="0.5"/>
  <text x="60" y="410" font-size="9" fill="#86efac">base: 0xC0400000  size: 4MB</text>
  <text x="60" y="422" font-size="9" fill="#4ade80">kmalloc(size) | kfree(ptr)</text>
  <text x="60" y="426" font-size="8" fill="#6b7280">mm/heap.c — REQ-MEM-04,05</text>

  <!-- IFrameAlloc connection -->
  <line x1="256" y1="300" x2="270" y2="300" stroke="#22c55e" stroke-width="1.5"/>

  <!-- heap uses IFrameAlloc -->
  <line x1="150" y1="375" x2="150" y2="356" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="155" y="368" font-size="8" fill="#16a34a">«uses»</text>

