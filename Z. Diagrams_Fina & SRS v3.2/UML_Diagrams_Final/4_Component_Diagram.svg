  <rect width="1100" height="760" fill="#0f172a"/>
  <rect x="0" y="0" width="1100" height="42" fill="#1e293b"/>
  <text x="550" y="27" text-anchor="middle" font-size="15" font-weight="bold" fill="#e2e8f0" letter-spacing="2">COMPONENT DIAGRAM — MiniOS Kernel Subsystem Structure</text>
  <text x="550" y="39" text-anchor="middle" font-size="9" fill="#64748b">MiniOS Group 31 | IIT Jodhpur | NFR-MAINT-01, NFR-PORT-01 | Directory: boot/ arch/ arch/x86/ mm/ scheduler/ include/ kernel/</text>

  <!-- ===================== «system» MiniOS Kernel outer border ===================== -->
  <rect x="15" y="55" width="1070" height="690" rx="8" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="30" y="73" font-size="12" fill="#64748b">«system» MiniOS Kernel</text>

  <!-- ===================== boot/ subsystem ===================== -->
  <rect x="30" y="82" width="220" height="110" rx="6" fill="#1a2035" stroke="#60a5fa" stroke-width="2"/>
  <text x="140" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">«subsystem» boot/</text>
  <rect x="50" y="108" width="180" height="70" rx="4" fill="#0f1d35" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="124" text-anchor="middle" font-size="10" font-weight="bold" fill="#bfdbfe">boot_module</text>
  <line x1="50" y1="130" x2="230" y2="130" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="60" y="143" font-size="9" fill="#93c5fd">boot.asm: Multiboot 0x1BADB002</text>
  <text x="60" y="155" font-size="9" fill="#93c5fd">→ protected mode → kernel_main</text>
  <text x="60" y="167" font-size="8" fill="#64748b">// REQ-MEM-01</text>

  <!-- ===================== kernel/ subsystem ===================== -->
  <rect x="270" y="82" width="270" height="110" rx="6" fill="#1a2035" stroke="#60a5fa" stroke-width="2"/>
  <text x="405" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">«subsystem» kernel/</text>

  <rect x="285" y="108" width="115" height="70" rx="4" fill="#0f1d35" stroke="#3b82f6" stroke-width="1"/>
  <text x="342" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="#bfdbfe">vga_module</text>
  <line x1="285" y1="130" x2="400" y2="130" stroke="#3b82f6" stroke-width="0.5"/>
  <text x="342" y="143" text-anchor="middle" font-size="8.5" fill="#93c5fd">vga.c</text>
  <text x="342" y="155" text-anchor="middle" font-size="8.5" fill="#93c5fd">0xB8000 80×25</text>
  <text x="342" y="167" font-size="8" fill="#64748b">vga_putchar/puts</text>

  <rect x="410" y="108" width="115" height="70" rx="4" fill="#0f1d35" stroke="#3b82f6" stroke-width="1"/>
  <text x="467" y="124" text-anchor="middle" font-size="9" font-weight="bold" fill="#bfdbfe">serial_module</text>
  <line x1="410" y1="130" x2="525" y2="130" stroke="#3b82f6" stroke-width="0.5"/>
