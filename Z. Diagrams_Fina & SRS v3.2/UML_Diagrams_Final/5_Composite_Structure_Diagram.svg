  <text x="590" y="220" font-size="9" fill="#c084fc">isr_stubs 0–31 in NASM</text>
  <text x="590" y="233" font-size="8" fill="#64748b">arch/x86/idt.c + isr_stubs.asm</text>
  <text x="590" y="246" font-size="8" fill="#64748b">REQ-TASK-01 | NFR-REL-01</text>
  <text x="590" y="259" font-size="8" fill="#64748b">isr_handler.c: irq_common_stub</text>

