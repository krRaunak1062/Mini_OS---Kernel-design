  <rect width="1100" height="760" fill="#0f172a"/>
  <rect x="0" y="0" width="1100" height="42" fill="#1e293b"/>
  <text x="550" y="27" text-anchor="middle" font-size="15" font-weight="bold" fill="#e2e8f0" letter-spacing="2">COMPOSITE STRUCTURE DIAGRAM — kernel_system : KernelSystem</text>
  <text x="550" y="39" text-anchor="middle" font-size="9" fill="#64748b">MiniOS Group 31 | IIT Jodhpur | Internal structure with port connectors and interface bindings</text>

