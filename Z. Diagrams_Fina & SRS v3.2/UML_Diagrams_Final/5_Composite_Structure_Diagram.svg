  <text x="942" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#e9d5ff">tcb : TaskControlBlock</text>
  <line x1="830" y1="134" x2="1055" y2="134" stroke="#7e22ce" stroke-width="0.5"/>
  <!-- Exact fields from task.h -->
  <text x="840" y="148" font-size="9" fill="#d8b4fe">pid          : uint32_t   // offset 0</text>
  <text x="840" y="161" font-size="9" fill="#d8b4fe">state        : {READY=0,RUNNING=1,</text>
  <text x="840" y="174" font-size="9" fill="#d8b4fe">               BLOCKED=2,TERM=3}</text>
  <text x="840" y="187" font-size="9" fill="#e879f9">kernel_esp   : uint32_t   // offset 8 ★</text>
  <text x="840" y="200" font-size="9" fill="#e879f9">page_dir     : uint32_t   // offset 12 ★</text>
  <text x="840" y="213" font-size="9" fill="#d8b4fe">next         : tcb_t*     // offset 16</text>
  <text x="840" y="226" font-size="9" fill="#d8b4fe">kernel_stack : uint8_t*   // offset 20</text>
  <text x="840" y="239" font-size="8" fill="#7c3aed">★ _Static_assert verified</text>
  <line x1="830" y1="244" x2="1055" y2="244" stroke="#7e22ce" stroke-width="0.5"/>
  <text x="840" y="257" font-size="8.5" fill="#c084fc">Stack frame (top→bottom):</text>
  <text x="840" y="270" font-size="8" fill="#a5b4fc">EFLAGS(0x202) CS(0x08) EIP(fn)</text>
  <text x="840" y="282" font-size="8" fill="#a5b4fc">DS(0x10) EAX ECX EDX EBX</text>
  <text x="840" y="294" font-size="8" fill="#a5b4fc">ESP EBP ESI EDI ← kernel_esp</text>
  <text x="840" y="307" font-size="8" fill="#64748b">KERNEL_STACK_SIZE = 8192 bytes</text>
  <text x="840" y="320" font-size="8" fill="#64748b">scheduler/task.c — REQ-TASK-03</text>

  <!-- sched -->
  <rect x="580" y="280" width="220" height="135" rx="4" fill="#160a30" stroke="#6366f1" stroke-width="1.5"/>
  <text x="690" y="296" text-anchor="middle" font-size="10" font-weight="bold" fill="#e0e7ff">sched : Scheduler</text>
  <line x1="580" y1="302" x2="800" y2="302" stroke="#6366f1" stroke-width="0.5"/>
  <text x="590" y="316" font-size="9" fill="#c7d2fe">algorithm : Round-Robin</text>
  <text x="590" y="329" font-size="9" fill="#c7d2fe">timeSlice  : 10ms</text>
  <text x="590" y="342" font-size="9" fill="#c7d2fe">task_count : uint32_t</text>
  <line x1="580" y1="348" x2="800" y2="348" stroke="#6366f1" stroke-width="0.5"/>
  <text x="590" y="362" font-size="9" fill="#818cf8">sched_switch()  — REQ-TASK-04</text>
  <text x="590" y="375" font-size="9" fill="#818cf8">sched_add_task(tcb*) — PUSHF/CLI/POPF</text>
  <text x="590" y="388" font-size="9" fill="#818cf8">sched_start() — boot_tcb bootstrap</text>
  <text x="590" y="401" font-size="9" fill="#818cf8">sched_next() — skip non-READY</text>
  <text x="590" y="407" font-size="8" fill="#64748b">scheduler/sched.c — REQ-TASK-04,05</text>

  <!-- Required IInterrupt from sched -->
  <circle cx="580" cy="350" r="7" fill="none" stroke="#9333ea" stroke-width="1.5"/>
  <text x="559" y="347" font-size="8" fill="#9333ea" text-anchor="end">R</text>
  <text x="554" y="358" font-size="7.5" fill="#d8b4fe" text-anchor="end">R:Interrupt</text>

  <!-- IInterrupt connector: idt PROVIDED → sched REQUIRED -->
  <path d="M800 185 Q810 185 810 300 Q810 350 580 350" fill="none" stroke="#9333ea" stroke-width="2"/>

  <!-- Required IPageDir from sched (EXT-SW-01) -->
  <circle cx="580" cy="320" r="7" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="559" y="317" font-size="8" fill="#f59e0b" text-anchor="end">R</text>
  <text x="554" y="328" font-size="7.5" fill="#fbbf24" text-anchor="end">EXT-SW-01</text>

  <!-- IPageDir connector from vmm to sched -->
  <line x1="470" y1="345" x2="580" y2="320" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#dep)"/>

  <!-- sched → tcb uses -->
  <line x1="800" y1="350" x2="830" y2="200" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="818" y="285" font-size="8" fill="#818cf8" text-anchor="middle">«uses»</text>

  <!-- =================== Deadlock Prevention =================== -->
  <rect x="15" y="450" width="1070" height="95" rx="6" fill="#1a1200" stroke="#f59e0b" stroke-width="2"/>
  <text x="30" y="468" font-size="11" font-weight="bold" fill="#fbbf24">dp : deadlock_prevention (cross-cutting — monitors both subsystems)</text>
  <text x="30" y="484" font-size="9" fill="#fcd34d">Strategy: Resource Ordering — locks acquired in fixed order: mm (memory) → sched (scheduler) → io (hardware).</text>
  <text x="30" y="497" font-size="9" fill="#fcd34d">Circular-wait impossible: ordering strict and enforced at compile-time via coding standards and code review.</text>
  <text x="30" y="510" font-size="9" fill="#f59e0b">Deadlock Avoidance: Only one lock held at a time per subsystem; sched_switch() disables interrupts (cli/sti) during queue mutation via PUSHF/CLI/POPF.</text>
  <text x="30" y="523" font-size="9" fill="#f59e0b">Livelock Prevention: Timer guarantees preemption every 10ms; sched_next() skips non-READY tasks, preventing any task from monopolising CPU indefinitely.</text>
  <text x="30" y="536" font-size="9" fill="#f59e0b">Race Prevention: sched_add_task() saves EFLAGS, CLI, mutates queue, POPF — restores interrupt state exactly (R-14 fix, B-05 in Bug Register).</text>

  <!-- =================== arch/x86 note =================== -->
  <rect x="15" y="558" width="1070" height="50" rx="6" fill="#0a0a20" stroke="#475569" stroke-width="1.5"/>
  <text x="30" y="576" font-size="10" font-weight="bold" fill="#94a3b8">arch/x86 layer — ALL hardware port accesses below this line (gdt, idt, pic, pit, context_switch.asm, paging_asm.asm, CR0/CR3)</text>
  <text x="30" y="592" font-size="9" fill="#64748b">NFR-PORT-01: No CR0/CR3/outb/inb outside arch/x86/ directory. Verified by S5 code audit. Porting to new arch requires only rewriting arch/x86/.</text>

  <!-- Outer border -->
  <rect x="10" y="50" width="1080" height="560" fill="none" stroke="#334155" stroke-width="1" rx="2"/>
</svg>
