<svg viewBox="0 0 960 660" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <!-- Background -->
  <rect width="960" height="660" fill="#0d1117"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-size="18" font-weight="bold" fill="#58a6ff" letter-spacing="1">UML DEPLOYMENT DIAGRAM — MiniOS Execution Environment</text>
  <text x="480" y="56" text-anchor="middle" font-size="11" fill="#8b949e">MiniOS Group 31 | IIT Jodhpur | NFR-PORT-01 (QEMU i686 target)</text>
  <line x1="60" y1="66" x2="900" y2="66" stroke="#30363d" stroke-width="1"/>

  <!-- ====================== HOST MACHINE NODE ====================== -->
  <rect x="30" y="82" width="280" height="530" rx="10" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
  <!-- 3D corner indicator for node -->
  <polygon points="30,82 55,82 55,107 30,107" fill="#58a6ff" opacity="0.2"/>
  <polygon points="30,82 55,57 80,82" fill="#58a6ff" opacity="0.4"/>
  <text x="160" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#58a6ff">«device»</text>
  <text x="160" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#58a6ff">Host Development Machine</text>
  <text x="160" y="130" text-anchor="middle" font-size="10" fill="#8b949e">Ubuntu Linux | i686-elf-gcc | NASM</text>
  <line x1="50" y1="138" x2="290" y2="138" stroke="#30363d" stroke-width="1"/>

  <!-- Source artifacts -->
  <rect x="50" y="148" width="240" height="36" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="170" y="163" text-anchor="middle" font-size="10" font-weight="bold" fill="#3fb950">«artifact» Source Files (.c / .asm)</text>
  <text x="170" y="177" text-anchor="middle" font-size="9" fill="#6e7681">boot/ arch/x86/ mm/ scheduler/ kernel/ include/</text>

  <text x="170" y="205" text-anchor="middle" font-size="9" fill="#6e7681">↓ i686-elf-gcc -m32 -ffreestanding -O2</text>
  <text x="170" y="217" text-anchor="middle" font-size="9" fill="#6e7681">↓ nasm -f elf32</text>

  <!-- Object files -->
  <rect x="50" y="226" width="240" height="30" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1"/>
  <text x="170" y="241" text-anchor="middle" font-size="10" fill="#3fb950">«artifact» Object Files (.o)</text>
  <text x="170" y="253" text-anchor="middle" font-size="9" fill="#6e7681">compiled ELF relocatables</text>

  <text x="170" y="275" text-anchor="middle" font-size="9" fill="#6e7681">↓ i686-elf-ld -T linker.ld</text>

  <!-- Kernel ELF -->
  <rect x="50" y="284" width="240" height="36" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="170" y="300" text-anchor="middle" font-size="10" font-weight="bold" fill="#f0883e">«artifact» kernel.elf</text>
  <text x="170" y="314" text-anchor="middle" font-size="9" fill="#6e7681">Load @ 0x100000 | Virtual base 0xC0000000</text>

  <text x="170" y="338" text-anchor="middle" font-size="9" fill="#6e7681">↓ grub-mkrescue</text>

  <!-- ISO artifact -->
  <rect x="50" y="347" width="240" height="30" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="170" y="362" text-anchor="middle" font-size="10" font-weight="bold" fill="#f0883e">«artifact» MiniOS.iso</text>
  <text x="170" y="374" text-anchor="middle" font-size="9" fill="#6e7681">bootable ISO-9660 + GRUB2 bootloader</text>

  <!-- Makefile -->
  <rect x="50" y="396" width="110" height="44" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="105" y="413" text-anchor="middle" font-size="9" font-weight="bold" fill="#d2a8ff">«artifact»</text>
  <text x="105" y="425" text-anchor="middle" font-size="9" fill="#d2a8ff">Makefile</text>
  <text x="105" y="437" text-anchor="middle" font-size="8" fill="#6e7681">all/clean/iso/run</text>

  <!-- Linker script -->
  <rect x="180" y="396" width="110" height="44" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1"/>
  <text x="235" y="413" text-anchor="middle" font-size="9" font-weight="bold" fill="#d2a8ff">«artifact»</text>
  <text x="235" y="425" text-anchor="middle" font-size="9" fill="#d2a8ff">linker.ld</text>
  <text x="235" y="437" text-anchor="middle" font-size="8" fill="#6e7681">sections 4KB-aligned</text>

  <!-- COM1 serial output -->
  <rect x="50" y="456" width="240" height="36" rx="5" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="170" y="472" text-anchor="middle" font-size="9" font-weight="bold" fill="#8b949e">«device» COM1 Serial (0x3F8)</text>
  <text x="170" y="485" text-anchor="middle" font-size="8" fill="#6e7681">9600 baud → piped to host terminal</text>

  <!-- VGA display -->
  <rect x="50" y="503" width="240" height="36" rx="5" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="170" y="519" text-anchor="middle" font-size="9" font-weight="bold" fill="#8b949e">«device» VGA Console (0xB8000)</text>
  <text x="170" y="532" text-anchor="middle" font-size="8" fill="#6e7681">80×25 text mode → QEMU SDL window</text>

  <!-- ====================== QEMU NODE ====================== -->
  <rect x="360" y="82" width="570" height="530" rx="10" fill="#0d1117" stroke="#3fb950" stroke-width="2"/>
  <polygon points="360,82 385,82 385,107 360,107" fill="#3fb950" opacity="0.2"/>
  <polygon points="360,82 385,57 410,82" fill="#3fb950" opacity="0.4"/>
  <text x="645" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#3fb950">«executionEnvironment»</text>
  <text x="645" y="116" text-anchor="middle" font-size="13" font-weight="bold" fill="#3fb950">QEMU i386 Virtual Machine</text>
  <text x="645" y="130" text-anchor="middle" font-size="10" fill="#8b949e">qemu-system-i386 -cdrom MiniOS.iso -serial stdio -m 32M</text>
  <line x1="380" y1="138" x2="910" y2="138" stroke="#30363d" stroke-width="1"/>

  <!-- ---- GRUB ---- -->
  <rect x="380" y="150" width="530" height="46" rx="6" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="645" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#f0883e">«component» GRUB2 Bootloader</text>
  <text x="645" y="184" text-anchor="middle" font-size="9" fill="#6e7681">Multiboot compliant | magic=0x1BADB002 | loads kernel.elf to 0x100000</text>

  <!-- ---- CPU / Execution ---- -->
  <rect x="380" y="212" width="530" height="260" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="645" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="#58a6ff">«component» i386 CPU (Protected Mode)</text>
  <line x1="400" y1="240" x2="890" y2="240" stroke="#30363d" stroke-width="1"/>

  <!-- Subsystem boxes inside CPU -->
  <!-- Memory Mgmt -->
  <rect x="398" y="250" width="155" height="105" rx="5" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="475" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#3fb950">Memory Mgmt</text>
  <text x="475" y="281" text-anchor="middle" font-size="8" fill="#6e7681">S1: GDT (null+CS+DS)</text>
  <text x="475" y="293" text-anchor="middle" font-size="8" fill="#6e7681">S1: Bitmap allocator</text>
  <text x="475" y="305" text-anchor="middle" font-size="8" fill="#6e7681">S2: Paging (CR0/CR3)</text>
  <text x="475" y="317" text-anchor="middle" font-size="8" fill="#6e7681">S2: Heap kmalloc/kfree</text>
  <text x="475" y="329" text-anchor="middle" font-size="8" fill="#6e7681">mm/ | arch/x86/paging.c</text>
  <text x="475" y="345" text-anchor="middle" font-size="8" fill="#3fb950">Owner: Aman</text>

  <!-- Interrupt Infra -->
  <rect x="563" y="250" width="155" height="105" rx="5" fill="#161b22" stroke="#f0883e" stroke-width="1.5"/>
  <text x="640" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#f0883e">Interrupt Infra</text>
  <text x="640" y="281" text-anchor="middle" font-size="8" fill="#6e7681">S3: IDT 256 gates</text>
  <text x="640" y="293" text-anchor="middle" font-size="8" fill="#6e7681">S3: PIC remap 0x20/0x28</text>
  <text x="640" y="305" text-anchor="middle" font-size="8" fill="#6e7681">S3: PIT 100Hz div=11932</text>
  <text x="640" y="317" text-anchor="middle" font-size="8" fill="#6e7681">S3: ISR 0-31 + IRQ 0-15</text>
  <text x="640" y="329" text-anchor="middle" font-size="8" fill="#6e7681">arch/x86/idt.c pic.c pit.c</text>
  <text x="640" y="345" text-anchor="middle" font-size="8" fill="#f0883e">Owner: Raunak</text>

  <!-- Scheduler -->
  <rect x="728" y="250" width="175" height="105" rx="5" fill="#161b22" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="815" y="267" text-anchor="middle" font-size="10" font-weight="bold" fill="#d2a8ff">Scheduler</text>
  <text x="815" y="281" text-anchor="middle" font-size="8" fill="#6e7681">S4: TCB struct (6 fields)</text>
  <text x="815" y="293" text-anchor="middle" font-size="8" fill="#6e7681">S4: task_create/destroy</text>
  <text x="815" y="305" text-anchor="middle" font-size="8" fill="#6e7681">S4: Circular ready queue</text>
  <text x="815" y="317" text-anchor="middle" font-size="8" fill="#6e7681">S4: context_switch IRET</text>
  <text x="815" y="329" text-anchor="middle" font-size="8" fill="#6e7681">scheduler/ arch/x86/</text>
  <text x="815" y="345" text-anchor="middle" font-size="8" fill="#d2a8ff">Owner: Raunak</text>

  <!-- Integration layer -->
  <rect x="398" y="366" width="505" height="40" rx="5" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="650" y="381" text-anchor="middle" font-size="10" font-weight="bold" fill="#8b949e">Integration (S5) — s5_integration.c</text>
  <text x="650" y="395" text-anchor="middle" font-size="9" fill="#6e7681">NFR-PERF-01 (0.3μs &lt; 50μs) | NFR-PERF-02 (1000 ticks/10s) | NFR-SEC-01 | EXT-SW-01</text>

  <!-- physical memory map -->
  <rect x="380" y="486" width="530" height="110" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="645" y="504" text-anchor="middle" font-size="10" font-weight="bold" fill="#8b949e">Physical Memory Layout (32MB QEMU)</text>
  <line x1="400" y1="512" x2="890" y2="512" stroke="#30363d" stroke-width="1"/>

  <!-- memory bars -->
  <rect x="408" y="520" width="40" height="20" fill="#3fb950" opacity="0.7" rx="2"/>
  <text x="454" y="534" font-size="8" fill="#8b949e">0x000–0x100k: BIOS/Reserved</text>

  <rect x="408" y="543" width="80" height="20" fill="#f0883e" opacity="0.7" rx="2"/>
  <text x="494" y="558" font-size="8" fill="#8b949e">0x100000: kernel.elf (code+data+BSS)</text>

  <rect x="408" y="566" width="100" height="20" fill="#d2a8ff" opacity="0.7" rx="2"/>
  <text x="514" y="581" font-size="8" fill="#8b949e">0x500000: 4MB heap (kmalloc pool)</text>

  <!-- link between Host and QEMU -->
  <path d="M 310 375 L 360 375" stroke="#58a6ff" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-blue2)"/>
  <text x="335" y="365" text-anchor="middle" font-size="8" fill="#58a6ff">make run</text>
  <text x="335" y="390" text-anchor="middle" font-size="8" fill="#6e7681">ISO mount</text>

  <defs>
    <marker id="arr-blue2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- NFR label bottom -->
  <text x="480" y="644" text-anchor="middle" font-size="10" fill="#6e7681">NFR-PORT-01: kernel.elf is a freestanding ELF32; QEMU replaces physical hardware. COM1 serial verified via -serial stdio flag.</text>
</svg>
