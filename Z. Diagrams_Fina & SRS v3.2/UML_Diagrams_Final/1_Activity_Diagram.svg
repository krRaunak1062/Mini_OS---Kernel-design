<svg viewBox="0 0 980 720" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
    <marker id="arr-w" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e2650a"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#00000030"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="720" fill="#0f172a"/>

  <!-- Title -->
  <rect x="0" y="0" width="980" height="42" fill="#1e293b"/>
  <text x="490" y="27" text-anchor="middle" font-size="15" font-weight="bold" fill="#e2e8f0" letter-spacing="2">ACTIVITY DIAGRAM — IRQ0 TIMER INTERRUPT &amp; ROUND-ROBIN SCHEDULING</text>
  <text x="490" y="39" text-anchor="middle" font-size="9" fill="#64748b">MiniOS Group 31 | IIT Jodhpur | REQ-TASK-02, REQ-TASK-04, REQ-TASK-05 | NFR-PERF-01</text>

  <!-- Swimlane headers -->
  <rect x="10" y="50" width="300" height="30" fill="#1e3a5f" rx="2"/>
  <text x="160" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#93c5fd">CPU / User Mode</text>

  <rect x="320" y="50" width="340" height="30" fill="#2d1b69" rx="2"/>
  <text x="490" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#c4b5fd">Kernel Mode (ISR)</text>

  <rect x="670" y="50" width="300" height="30" fill="#1a3a2a" rx="2"/>
  <text x="820" y="70" text-anchor="middle" font-size="12" font-weight="bold" fill="#6ee7b7">Hardware Layer</text>

  <!-- Swimlane bodies -->
  <rect x="10" y="80" width="300" height="620" fill="#0f2540" rx="0" opacity="0.5"/>
  <rect x="320" y="80" width="340" height="620" fill="#1a0f40" rx="0" opacity="0.5"/>
  <rect x="670" y="80" width="300" height="620" fill="#0a2019" rx="0" opacity="0.5"/>

  <!-- Swimlane vertical borders -->
  <line x1="320" y1="50" x2="320" y2="700" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="670" y1="50" x2="670" y2="700" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- === HARDWARE SIDE === -->
  <!-- PIT fires IRQ0 -->
  <ellipse cx="820" cy="130" rx="110" ry="22" fill="#065f46" stroke="#34d399" stroke-width="2" filter="url(#shadow)"/>
  <text x="820" y="134" text-anchor="middle" font-size="11" font-weight="bold" fill="#6ee7b7">PIT fires IRQ0 (100 Hz)</text>

  <!-- Arrow from HW to kernel -->
  <line x1="720" y1="130" x2="665" y2="130" stroke="#e2650a" stroke-width="2" marker-end="url(#arr-w)"/>
  <text x="693" y="124" text-anchor="middle" font-size="8" fill="#e2650a">interrupt</text>

  <!-- EOI box in hardware lane -->
  <rect x="730" y="485" width="180" height="36" rx="18" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="820" y="499" text-anchor="middle" font-size="10" font-weight="bold" fill="#34d399">pic_send_eoi(0)</text>
  <text x="820" y="512" text-anchor="middle" font-size="9" fill="#6ee7b7">port 0x20 — master PIC</text>

  <!-- === KERNEL MODE === -->
  <!-- CPU -> Kernel Mode -->
  <rect x="330" y="108" width="280" height="30" rx="6" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="470" y="128" text-anchor="middle" font-size="11" fill="#c7d2fe">CPU → kernel mode via IDT gate</text>

  <!-- ISR stub: push vector -->
  <rect x="330" y="160" width="280" height="30" rx="6" fill="#3730a3" stroke="#818cf8" stroke-width="1.5"/>
  <text x="470" y="175" text-anchor="middle" font-size="10" fill="#e0e7ff">isr_stubs.asm: push 32 → irq_common_stub</text>
  <text x="470" y="187" text-anchor="middle" font-size="9" fill="#a5b4fc">pushad — save all GP regs</text>

  <!-- Arrows in kernel -->
  <line x1="470" y1="138" x2="470" y2="160" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="470" y1="190" x2="470" y2="210" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Call irq_handler → pit_irq0_handler -->
  <rect x="330" y="210" width="280" height="30" rx="6" fill="#3730a3" stroke="#818cf8" stroke-width="1.5"/>
  <text x="470" y="225" text-anchor="middle" font-size="10" fill="#e0e7ff">irq_handler() → pit_irq0_handler()</text>
  <text x="470" y="237" text-anchor="middle" font-size="9" fill="#a5b4fc">pit_tick_count++</text>

  <line x1="470" y1="240" x2="470" y2="260" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- EOI sent FIRST -->
  <rect x="330" y="260" width="280" height="36" rx="8" fill="#1c1c70" stroke="#6366f1" stroke-width="2"/>
  <text x="470" y="275" text-anchor="middle" font-size="10" font-weight="bold" fill="#a5b4fc">pic_send_eoi(0) — EOI FIRST</text>
  <text x="470" y="289" text-anchor="middle" font-size="9" fill="#818cf8">re-arms PIC before context switch</text>

  <!-- Arrow to hardware for EOI -->
  <line x1="610" y1="278" x2="730" y2="503" stroke="#e2650a" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-w)"/>

  <line x1="470" y1="296" x2="470" y2="320" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- sched_switch() -->
  <rect x="330" y="320" width="280" height="30" rx="6" fill="#3730a3" stroke="#818cf8" stroke-width="1.5"/>
  <text x="470" y="335" text-anchor="middle" font-size="10" fill="#e0e7ff">sched_switch()</text>
  <text x="470" y="347" text-anchor="middle" font-size="9" fill="#a5b4fc">REQ-TASK-04</text>

  <line x1="470" y1="350" x2="470" y2="374" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Diamond: current_task == NULL? -->
  <polygon points="470,374 540,395 470,416 400,395" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="470" y="391" text-anchor="middle" font-size="9" fill="#c7d2fe">current_task</text>
  <text x="470" y="403" text-anchor="middle" font-size="9" fill="#c7d2fe">== NULL?</text>

  <!-- No (proceed) -->
  <text x="545" y="391" font-size="9" fill="#94a3b8">No</text>
  <line x1="540" y1="395" x2="580" y2="395" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Diamond: task_count < 2? -->
  <polygon points="630,395 700,416 630,437 560,416" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.5"/>
  <text x="630" y="412" text-anchor="middle" font-size="9" fill="#c7d2fe">task_count</text>
  <text x="630" y="424" text-anchor="middle" font-size="9" fill="#c7d2fe">&lt; 2 ?</text>

  <!-- YES: no-op early return label -->
  <text x="630" y="444" text-anchor="middle" font-size="9" fill="#f87171">Yes → return (no-op)</text>

  <!-- Yes: NULL case -->
  <text x="410" y="420" font-size="9" fill="#f87171">Yes</text>
  <line x1="470" y1="416" x2="470" y2="440" stroke="#f87171" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="470" y="452" text-anchor="middle" font-size="9" fill="#f87171">return (no-op)</text>

  <!-- No from task_count: proceed -->
  <line x1="470" y1="475" x2="470" y2="510" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Proceed main path after diamond -->
  <line x1="700" y1="416" x2="730" y2="416" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="730" y1="416" x2="730" y2="470" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="730" y1="470" x2="470" y2="470" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="470" y1="470" x2="470" y2="510" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Save ESP to old TCB -->
  <rect x="330" y="510" width="280" height="30" rx="6" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
  <text x="470" y="525" text-anchor="middle" font-size="10" fill="#6ee7b7">Save esp → old_task→kernel_esp</text>
  <text x="470" y="537" text-anchor="middle" font-size="9" fill="#a7f3d0">old_task→state = READY</text>

  <line x1="470" y1="540" x2="470" y2="560" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- sched_next(): advance circular queue -->
  <rect x="330" y="560" width="280" height="30" rx="6" fill="#3730a3" stroke="#818cf8" stroke-width="1.5"/>
  <text x="470" y="575" text-anchor="middle" font-size="10" fill="#e0e7ff">sched_next(): advance circular queue</text>
  <text x="470" y="587" text-anchor="middle" font-size="9" fill="#a5b4fc">new_task→state = RUNNING</text>

  <line x1="470" y1="590" x2="470" y2="610" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- context_switch(old, new) -->
  <rect x="330" y="610" width="280" height="36" rx="8" fill="#1c1c70" stroke="#6366f1" stroke-width="2"/>
  <text x="470" y="625" text-anchor="middle" font-size="10" font-weight="bold" fill="#c7d2fe">context_switch(old_task, new_task)</text>
  <text x="470" y="639" text-anchor="middle" font-size="9" fill="#818cf8">load CR3 → new page_dir | IRET to resume</text>

  <!-- === CPU SIDE === -->
  <!-- Initial state -->
  <circle cx="160" cy="115" r="10" fill="#94a3b8"/>
  <text x="160" y="119" text-anchor="middle" font-size="8" fill="#0f172a">●</text>

  <line x1="160" y1="125" x2="160" y2="145" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Process executing -->
  <ellipse cx="160" cy="165" rx="100" ry="22" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="160" y="169" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">Task executing</text>

  <!-- Interrupted arrow -->
  <line x1="260" y1="165" x2="320" y2="130" stroke="#e2650a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-w)"/>
  <text x="295" y="143" font-size="8" fill="#e2650a" transform="rotate(-20,295,143)">IRQ0 fires</text>

  <!-- IRET resumes task -->
  <line x1="330" y1="628" x2="90" y2="628" stroke="#334155" stroke-width="1.5"/>
  <line x1="90" y1="628" x2="90" y2="200" stroke="#334155" stroke-width="1.5"/>
  <line x1="90" y1="200" x2="60" y2="200" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="15" y="185" width="140" height="36" rx="8" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="85" y="200" text-anchor="middle" font-size="10" font-weight="bold" fill="#93c5fd">IRET → resume</text>
  <text x="85" y="212" text-anchor="middle" font-size="9" fill="#60a5fa">next task's EIP</text>

  <!-- Terminal -->
  <circle cx="160" cy="685" r="10" fill="#334155" stroke="#94a3b8" stroke-width="2"/>
  <circle cx="160" cy="685" r="6" fill="#94a3b8"/>

  <!-- Legend -->
  <rect x="330" y="665" width="320" height="40" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="340" y="675" width="14" height="10" rx="2" fill="#312e81" stroke="#818cf8" stroke-width="1"/>
  <text x="358" y="684" font-size="9" fill="#a5b4fc">Kernel ISR path</text>
  <rect x="430" y="675" width="14" height="10" rx="2" fill="#065f46" stroke="#34d399" stroke-width="1"/>
  <text x="448" y="684" font-size="9" fill="#6ee7b7">Context switch</text>
  <rect x="530" y="675" width="14" height="10" rx="2" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="548" y="684" font-size="9" fill="#93c5fd">User space</text>

  <!-- Outer border -->
  <rect x="10" y="50" width="960" height="650" fill="none" stroke="#334155" stroke-width="1.5" rx="2"/>
</svg>
