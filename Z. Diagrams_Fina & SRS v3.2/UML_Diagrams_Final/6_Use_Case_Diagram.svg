<svg viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#00000050"/>
    </filter>
  </defs>

  <rect width="1000" height="700" fill="#0f172a"/>
  <rect x="0" y="0" width="1000" height="42" fill="#1e293b"/>
  <text x="500" y="27" text-anchor="middle" font-size="15" font-weight="bold" fill="#e2e8f0" letter-spacing="2">USE CASE DIAGRAM — MiniOS Kernel System</text>
  <text x="500" y="39" text-anchor="middle" font-size="9" fill="#64748b">MiniOS Group 31 | IIT Jodhpur | REQ-MEM-01–05, REQ-TASK-01–05, NFR-PERF-01/02, NFR-SEC-01</text>

  <!-- MiniOS Kernel System boundary -->
  <rect x="180" y="60" width="720" height="590" rx="8" fill="#111827" stroke="#475569" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="540" y="82" text-anchor="middle" font-size="14" font-weight="bold" fill="#64748b">MiniOS Kernel System</text>

  <!-- ======= ACTORS (left) ======= -->
  <!-- Kernel Developer -->
  <circle cx="70" cy="160" r="16" fill="none" stroke="#60a5fa" stroke-width="2"/>
  <line x1="70" y1="176" x2="70" y2="218" stroke="#60a5fa" stroke-width="2"/>
  <line x1="40" y1="195" x2="100" y2="195" stroke="#60a5fa" stroke-width="2"/>
  <line x1="70" y1="218" x2="45" y2="248" stroke="#60a5fa" stroke-width="2"/>
  <line x1="70" y1="218" x2="95" y2="248" stroke="#60a5fa" stroke-width="2"/>
  <text x="70" y="270" text-anchor="middle" font-size="11" font-weight="bold" fill="#93c5fd">Kernel Developer</text>
  <text x="70" y="284" text-anchor="middle" font-size="9" fill="#60a5fa">Group 31</text>

  <!-- User Process (kernel task) -->
  <circle cx="70" cy="420" r="16" fill="none" stroke="#a78bfa" stroke-width="2"/>
  <line x1="70" y1="436" x2="70" y2="478" stroke="#a78bfa" stroke-width="2"/>
  <line x1="40" y1="455" x2="100" y2="455" stroke="#a78bfa" stroke-width="2"/>
  <line x1="70" y1="478" x2="45" y2="508" stroke="#a78bfa" stroke-width="2"/>
  <line x1="70" y1="478" x2="95" y2="508" stroke="#a78bfa" stroke-width="2"/>
  <text x="70" y="530" text-anchor="middle" font-size="11" font-weight="bold" fill="#c4b5fd">Kernel Task</text>
  <text x="70" y="544" text-anchor="middle" font-size="9" fill="#a78bfa">task_a/b/c</text>

  <!-- ======= ACTORS (right) ======= -->
  <!-- Hardware Timer PIT -->
  <rect x="890" y="310" width="90" height="45" rx="4" fill="#1a1000" stroke="#f59e0b" stroke-width="2"/>
  <text x="935" y="328" text-anchor="middle" font-size="10" font-weight="bold" fill="#fbbf24">Hardware</text>
  <text x="935" y="341" text-anchor="middle" font-size="9" fill="#f59e0b">Timer (PIT)</text>
  <text x="935" y="354" text-anchor="middle" font-size="8" fill="#78716c">IRQ0 100Hz</text>

  <!-- GRUB / Bootloader -->
  <rect x="890" y="130" width="90" height="45" rx="4" fill="#1a2035" stroke="#3b82f6" stroke-width="2"/>
  <text x="935" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#93c5fd">GRUB</text>
  <text x="935" y="162" text-anchor="middle" font-size="9" fill="#60a5fa">Bootloader</text>
  <text x="935" y="175" text-anchor="middle" font-size="8" fill="#334155">Multiboot</text>

  <!-- ======= MEMORY MANAGEMENT use cases ======= -->
  <rect x="195" y="95" width="330" height="270" rx="6" fill="#0c1f16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#86efac">Memory Management</text>

  <!-- UC1: Init GDT -->
  <ellipse cx="360" cy="145" rx="130" ry="20" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="149" text-anchor="middle" font-size="10" fill="#dcfce7">UC-01: Initialise GDT</text>
  <text x="360" y="162" text-anchor="middle" font-size="8" fill="#86efac">REQ-MEM-01 | gdt_init()</text>

  <!-- UC2: Allocate Physical Frame -->
  <ellipse cx="360" cy="195" rx="130" ry="20" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="199" text-anchor="middle" font-size="10" fill="#dcfce7">UC-02: Allocate Physical Frame</text>
  <text x="360" y="212" text-anchor="middle" font-size="8" fill="#86efac">REQ-MEM-03 | mm_alloc_frame()</text>

  <!-- UC3: Free Physical Frame -->
  <ellipse cx="360" cy="245" rx="130" ry="20" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="249" text-anchor="middle" font-size="10" fill="#dcfce7">UC-03: Free Physical Frame</text>
  <text x="360" y="262" text-anchor="middle" font-size="8" fill="#86efac">REQ-MEM-03 | mm_free_frame()</text>

  <!-- UC4: Map Virtual → Physical -->
  <ellipse cx="360" cy="295" rx="130" ry="20" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="299" text-anchor="middle" font-size="10" fill="#dcfce7">UC-04: Map Virtual → Physical</text>
  <text x="360" y="312" text-anchor="middle" font-size="8" fill="#86efac">REQ-MEM-02,04 | paging_map_page()</text>

  <!-- UC5: Handle Page Fault -->
  <ellipse cx="360" cy="345" rx="130" ry="20" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="360" y="349" text-anchor="middle" font-size="10" fill="#dcfce7">UC-05: Handle Page Fault (ISR 14)</text>
  <text x="360" y="362" text-anchor="middle" font-size="8" fill="#86efac">NFR-REL-01, NFR-SEC-01 | isr14.c</text>

  <!-- ======= TASK MANAGEMENT use cases ======= -->
  <rect x="545" y="95" width="330" height="340" rx="6" fill="#1a0a35" stroke="#9333ea" stroke-width="1.5"/>
  <text x="710" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#d8b4fe">Task Management</text>

  <!-- UC6: Setup IDT+PIC+PIT -->
  <ellipse cx="710" cy="148" rx="135" ry="20" fill="#2d1657" stroke="#9333ea" stroke-width="1.5"/>
  <text x="710" y="152" text-anchor="middle" font-size="10" fill="#f3e8ff">UC-06: Setup IDT / PIC / PIT</text>
  <text x="710" y="165" text-anchor="middle" font-size="8" fill="#d8b4fe">REQ-TASK-01,02 | idt_init+pic_remap+pit_init</text>

  <!-- UC7: Create Task -->
  <ellipse cx="710" cy="200" rx="135" ry="20" fill="#2d1657" stroke="#9333ea" stroke-width="1.5"/>
  <text x="710" y="204" text-anchor="middle" font-size="10" fill="#f3e8ff">UC-07: Create Task (TCB)</text>
  <text x="710" y="217" text-anchor="middle" font-size="8" fill="#d8b4fe">REQ-TASK-03 | task_create(fn)</text>

  <!-- UC8: Schedule Next Task -->
  <ellipse cx="710" cy="252" rx="135" ry="20" fill="#2d1657" stroke="#9333ea" stroke-width="1.5"/>
  <text x="710" y="256" text-anchor="middle" font-size="10" fill="#f3e8ff">UC-08: Schedule Next Task</text>
  <text x="710" y="269" text-anchor="middle" font-size="8" fill="#d8b4fe">REQ-TASK-04 | sched_switch()</text>

  <!-- UC9: Context Switch (include) -->
  <ellipse cx="710" cy="304" rx="135" ry="20" fill="#160a30" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="710" y="308" text-anchor="middle" font-size="10" fill="#e9d5ff">«include» Context Switch</text>
  <text x="710" y="321" text-anchor="middle" font-size="8" fill="#c084fc">REQ-TASK-05 | context_switch.asm</text>
  <text x="710" y="334" text-anchor="middle" font-size="8" fill="#c084fc">PUSHFD+DS+PUSHAD | CR3 | IRET</text>
  <!-- include arrow from UC8 to UC9 -->
  <line x1="710" y1="272" x2="710" y2="284" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="718" y="280" font-size="8" fill="#9333ea">«include»</text>

  <!-- UC10: Handle IRQ / Interrupt -->
  <ellipse cx="710" cy="365" rx="135" ry="20" fill="#2d1657" stroke="#9333ea" stroke-width="1.5"/>
  <text x="710" y="369" text-anchor="middle" font-size="10" fill="#f3e8ff">UC-10: Handle IRQ / Interrupt</text>
  <text x="710" y="382" text-anchor="middle" font-size="8" fill="#d8b4fe">REQ-TASK-02 | isr_stubs+irq_common_stub</text>

  <!-- UC11: Terminate Task -->
  <ellipse cx="710" cy="415" rx="135" ry="20" fill="#2d1657" stroke="#9333ea" stroke-width="1.5"/>
  <text x="710" y="419" text-anchor="middle" font-size="10" fill="#f3e8ff">UC-11: Terminate Task</text>
  <text x="710" y="432" text-anchor="middle" font-size="8" fill="#d8b4fe">REQ-TASK-03 | task_destroy(tcb)</text>

  <!-- ======= NFR VALIDATION use cases ======= -->
  <rect x="195" y="385" width="330" height="240" rx="6" fill="#1a1000" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="360" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="#fbbf24">NFR Validation (S5)</text>
  <text x="360" y="417" text-anchor="middle" font-size="9" fill="#f59e0b">s5_integration.c | s5_run_all_tests()</text>

  <ellipse cx="360" cy="445" rx="130" ry="18" fill="#1c1400" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="449" text-anchor="middle" font-size="9.5" fill="#fde68a">UC-12: Measure Context Switch</text>
  <text x="360" y="462" text-anchor="middle" font-size="8" fill="#fcd34d">NFR-PERF-01: measured 0.3µs &lt; 50µs</text>

  <ellipse cx="360" cy="495" rx="130" ry="18" fill="#1c1400" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="499" text-anchor="middle" font-size="9.5" fill="#fde68a">UC-13: Verify PIT Stability</text>
  <text x="360" y="512" text-anchor="middle" font-size="8" fill="#fcd34d">NFR-PERF-02: 1000 ticks in 10 seconds</text>

  <ellipse cx="360" cy="545" rx="130" ry="18" fill="#1c1400" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="549" text-anchor="middle" font-size="9.5" fill="#fde68a">UC-14: Test Kernel Isolation</text>
  <text x="360" y="562" text-anchor="middle" font-size="8" fill="#fcd34d">NFR-SEC-01: 0 violations / 2048+ PTEs</text>

  <ellipse cx="360" cy="595" rx="130" ry="18" fill="#1c1400" stroke="#d97706" stroke-width="1.5"/>
  <text x="360" y="599" text-anchor="middle" font-size="9.5" fill="#fde68a">UC-15: Stress Test Heap</text>
  <text x="360" y="612" text-anchor="middle" font-size="8" fill="#fcd34d">NFR-REL-01: concurrent kmalloc/kfree</text>

  <!-- ======= ACTOR CONNECTIONS ======= -->
  <!-- Kernel Developer → UC01..UC07 -->
  <line x1="100" y1="190" x2="195" y2="145" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="190" x2="195" y2="195" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="190" x2="195" y2="245" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="190" x2="195" y2="295" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="190" x2="575" y2="148" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="190" x2="575" y2="200" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="190" x2="195" y2="445" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- Kernel Task → schedule, context switch, terminate -->
  <line x1="100" y1="455" x2="575" y2="252" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="455" x2="575" y2="365" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="100" y1="455" x2="575" y2="415" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PIT → Handle IRQ, Schedule Next -->
  <line x1="890" y1="332" x2="845" y2="365" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="890" y1="332" x2="845" y2="252" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GRUB → boot sequence -->
  <line x1="890" y1="153" x2="845" y2="148" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- «extend» Deadlock Prevention from Free Frame -->
  <ellipse cx="820" cy="495" rx="120" ry="22" fill="#1a1200" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="820" y="492" text-anchor="middle" font-size="9.5" fill="#fbbf24">Deadlock Prevention</text>
  <text x="820" y="505" text-anchor="middle" font-size="8" fill="#f59e0b">(Resource Ordering: mm→sched→io)</text>
  <line x1="490" y1="245" x2="700" y2="495" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="610" y="368" font-size="9" fill="#f59e0b" transform="rotate(-53,610,368)">«extend»</text>

  <!-- Page Fault → security (extend) -->
  <line x1="490" y1="345" x2="700" y2="470" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="598" y="394" font-size="9" fill="#ef4444" transform="rotate(-47,598,394)">«extend» NFR-SEC-01</text>

  <!-- Legend -->
  <rect x="195" y="645" width="780" height="42" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <ellipse cx="240" cy="666" rx="35" ry="12" fill="#14532d" stroke="#22c55e" stroke-width="1"/>
  <text x="240" y="670" text-anchor="middle" font-size="8" fill="#86efac">Use Case</text>
  <line x1="290" y1="666" x2="310" y2="666" stroke="#475569" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="340" y="670" font-size="8" fill="#94a3b8">«include»/«extend»</text>
  <line x1="420" y1="666" x2="440" y2="666" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="490" y="670" font-size="8" fill="#94a3b8">Actor association</text>
  <text x="580" y="670" font-size="8" fill="#64748b">|  All 15 use cases verified — S5 NFR tests PASS  |  context switch: 0.3µs measured</text>
</svg>
